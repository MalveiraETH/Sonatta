name: Automatic Daily Backup

on:
  schedule:
    # 02:00 UTC (23:00 BRT / 20:00 Chile)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create backup
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.BACKUP_API_TOKEN }}" \
            ${{ secrets.API_URL }}/functions/backupDatabase \
            -o backup-$(date +%Y%m%d).json

      - name: Upload to S3
        uses: jakejarvis/s3-upload-action@master
        with:
          bucket: ${{ secrets.AWS_BACKUP_BUCKET }}
          key: backups/
          files: backup-*.json
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: us-east-1

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: backup-*.json
          tag_name: backup-$(date +%Y%m%d)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old backups (keep last 30)
        run: |
          aws s3api list-objects-v2 --bucket ${{ secrets.AWS_BACKUP_BUCKET }} \
            --prefix backups/ \
            --query 'sort_by(Contents,&LastModified)[:-30].[Key]' \
            --output text | \
            xargs -I {} aws s3 rm s3://${{ secrets.AWS_BACKUP_BUCKET }}/{}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Daily backup completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()